<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет финансов Evrozabor Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================= CSS ПЕРЕМЕННЫЕ (ДИЗАЙН-СИСТЕМА) ================= */
        :root {
            --bg-app: #F9FAFB;
            --bg-card: #FFFFFF;
            --bg-hover: #F3F4F6;
            
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-tertiary: #94A3B8;
            
            --border-light: #E2E8F0;
            --border-hover: #CBD5E1;
            
            --accent-primary: #6366F1; /* Indigo (Stripe/Linear style) */
            --accent-primary-hover: #4F46E5;
            --color-income: #10B981; /* Emerald */
            --color-expense: #F43F5E; /* Rose */
            --color-balance: #0EA5E9; /* Sky */
            
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.03);
            --shadow-float: 0 12px 24px -4px rgba(15, 23, 42, 0.06);
            --shadow-sticky: 4px 0 12px rgba(15, 23, 42, 0.03);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ================= БАЗОВЫЕ СТИЛИ ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            padding: 24px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .dashboard {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ================= ШАПКА И ФИЛЬТРЫ ================= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--text-primary);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: var(--shadow-sm);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-filter-group {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            padding: 6px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
        }

        .date-filter-group:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .date-input {
            border: none;
            background: transparent;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            border-radius: var(--radius-sm);
            transition: var(--transition-smooth);
        }

        .date-input:hover {
            background: var(--bg-hover);
        }

        .date-separator {
            color: var(--text-tertiary);
            padding: 0 4px;
        }

        .btn-clear {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-smooth);
        }

        .btn-clear:hover {
            background: #FEE2E2;
            color: var(--color-expense);
        }

        /* ================= KPI КАРТОЧКИ ================= */
        .top-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            padding: 24px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-float);
        }

        .kpi-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        /* Акцентные полоски сверху карточек */
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .kpi-card.income::before { background: var(--color-income); }
        .kpi-card.expense::before { background: var(--color-expense); }
        .kpi-card.balance::before { background: var(--accent-primary); }

        .kpi-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums; /* Ровные цифры */
            color: var(--text-primary);
        }

        .val-income { color: var(--color-income) !important; }
        .val-expense { color: var(--color-expense) !important; }

        /* ================= ТОП РАСХОДОВ ================= */
        .top-expenses-card {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .expense-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .expense-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .expense-meta {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
        }

        .expense-name { color: var(--text-secondary); }
        .expense-val { color: var(--text-primary); font-variant-numeric: tabular-nums; font-weight: 600; }

        .expense-bar-bg {
            background: var(--bg-hover);
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
        }

        .expense-bar-fill {
            background: linear-gradient(90deg, #FB7185, var(--color-expense));
            height: 100%;
            border-radius: 999px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ================= ТАБЛИЦА ================= */
        .table-card {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-header-wrapper {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-card);
        }

        .table-wrapper {
            max-height: 600px;
            overflow: auto;
            position: relative;
            background: var(--bg-card);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 20;
        }

        /* Glassmorphism для шапки таблицы */
        th {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px 20px;
            text-align: right;
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
        }

        td {
            padding: 16px 20px;
            white-space: nowrap;
            text-align: right;
            border-bottom: 1px solid var(--bg-hover);
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            transition: background 0.2s;
        }

        /* Закрепление первого столбца */
        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            text-align: left;
            z-index: 10;
        }
        
        /* Особый стиль для закрепленных ячеек для избежания прозрачности */
        td:first-child {
            background: var(--bg-card);
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        th:first-child { z-index: 30; } /* Выше остальных */

        /* Тень при горизонтальном скролле */
        th:first-child::after, td:first-child::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; width: 1px;
            background: var(--border-light);
            box-shadow: var(--shadow-sticky);
        }

        /* Итоговая строка */
        .total-row th {
            background: var(--bg-app);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
            text-transform: none;
            letter-spacing: 0;
            border-bottom: 2px solid var(--border-hover);
        }
        .total-row th:first-child { background: var(--bg-app); z-index: 30;}

        /* Эффект наведения на строки */
        tbody tr:hover td {
            background-color: #F8FAFC;
        }
        tbody tr:hover td:first-child {
            background-color: #F8FAFC;
        }

        /* ================= SKELETON LOADING (АНИМАЦИИ) ================= */
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: var(--radius-sm);
            color: transparent !important;
            user-select: none;
        }

        .skeleton-block {
            display: block;
            width: 100%;
            height: 24px;
            margin-bottom: 8px;
        }

        /* Скрытый изначальный загрузчик заменен на элегантный toast */
        #loadingToast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text-primary);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-float);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }
        
        #loadingToast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ================= МОБИЛЬНАЯ АДАПТАЦИЯ (MOBILE FIRST FEEL) ================= */
        @media (max-width: 1024px) {
            .top-layout { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .dashboard { gap: 16px; }
            
            .header { margin-bottom: 8px; flex-direction: column; align-items: stretch; gap: 16px; }
            .brand { justify-content: center; }
            .header h1 { font-size: 22px; }
            
            .header-controls { flex-direction: column; width: 100%; }
            .date-filter-group { 
                width: 100%; 
                padding: 4px; 
                display: grid;
                grid-template-columns: 1fr auto 1fr;
            }
            .date-input { 
                width: 100%; 
                text-align: center; 
                padding: 12px 8px; /* Удобно для пальца */
                font-size: 15px;
                background: var(--bg-hover);
            }
            .btn-clear { 
                width: 100%; 
                justify-content: center; 
                padding: 14px; 
                background: #FEE2E2; 
                color: var(--color-expense);
                margin-top: 8px;
                font-weight: 600;
            }
            .btn-clear .desktop-text { display: none; }
            .btn-clear::after { content: 'Очистить фильтр'; }

            .kpi-grid { grid-template-columns: 1fr; gap: 12px; }
            .kpi-card { 
                padding: 20px; 
                flex-direction: row; 
                justify-content: space-between; 
                align-items: center;
            }
            .kpi-card::before {
                width: 4px; height: 100%; top: 0; left: 0;
            }
            .kpi-value { font-size: 24px; }
            
            .card { padding: 16px; border-radius: 16px; }
            .table-header-wrapper { padding: 16px; }
            th, td { padding: 14px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div id="loadingToast">
        <div class="spinner"></div>
        <span>Синхронизация данных...</span>
    </div>

    <div class="dashboard">
        <div class="header">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                </div>
                <h1>Evrozabor Luxe</h1>
            </div>
            
            <div class="header-controls">
                <div class="date-filter-group">
                    <input type="date" id="startDate" class="date-input" title="Начальная дата">
                    <span class="date-separator">→</span>
                    <input type="date" id="endDate" class="date-input" title="Конечная дата">
                </div>
                <button id="clearDateBtn" class="btn-clear" title="Очистить">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    <span class="desktop-text">Сбросить</span>
                </button>
            </div>
        </div>

        <div class="top-layout">
            <div class="kpi-grid">
                <div class="card kpi-card income">
                    <div class="kpi-label">Доходы</div>
                    <div class="kpi-value val-income skeleton" id="kpiIncome">000 000 ₸</div>
                </div>
                <div class="card kpi-card expense">
                    <div class="kpi-label">Расходы</div>
                    <div class="kpi-value val-expense skeleton" id="kpiExpense">000 000 ₸</div>
                </div>
                <div class="card kpi-card balance">
                    <div class="kpi-label">Чистая прибыль</div>
                    <div class="kpi-value skeleton" id="kpiBalance">000 000 ₸</div>
                </div>
            </div>
            
            <div class="card top-expenses-card">
                <div class="section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary);"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Топ 5 расходов
                </div>
                <div class="expense-list" id="topExpensesList">
                    <div class="expense-item"><div class="skeleton skeleton-block"></div></div>
                    <div class="expense-item"><div class="skeleton skeleton-block"></div></div>
                    <div class="expense-item"><div class="skeleton skeleton-block"></div></div>
                </div>
            </div>
        </div>

        <div class="card table-card">
            <div class="table-header-wrapper">
                <div class="section-title" style="margin: 0;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary);"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                    Операции по дням
                </div>
            </div>
            <div class="table-wrapper" id="tableWrapper">
                <table id="transactionTable">
                    <thead>
                        <tr>
                            <th>Дата</th><th>Приход</th><th>Расход</th><th>Остаток</th>
                            <th>Материал</th><th>Заливка</th><th>Установка</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="7"><div class="skeleton skeleton-block"></div></td></tr>
                        <tr><td colspan="7"><div class="skeleton skeleton-block"></div></td></tr>
                        <tr><td colspan="7"><div class="skeleton skeleton-block"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeevuA1MTvQ09j-qcUWTPhArFe6k4Szilx6DB1kzEcnceA3ETJ1636AUpj8tRpldiZ8w/exec';
        const REFRESH_INTERVAL = 60000;

        const EXPENSE_CATEGORIES = [
            'Материал', 'Заливка', 'Установка', 'Доставка', 'Аренда', 'Зарплата', 
            'Ремонт', 'Кредит', 'Обед', 'Проезд', 'Личные расходы', 
            'Бензин Бакытжан', 'Коммунальные услуги', 'Расходники', 'Другие'
        ];

        let allTransactions = []; 
        let isFirstLoad = true;

        document.addEventListener('DOMContentLoaded', () => {
            // Toast показ
            const toast = document.getElementById('loadingToast');
            toast.classList.add('show');

            document.getElementById('startDate').addEventListener('change', applyFilter);
            document.getElementById('endDate').addEventListener('change', applyFilter);
            document.getElementById('clearDateBtn').addEventListener('click', () => {
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
                applyFilter();
            });

            fetchAndRender();
            setInterval(fetchAndRender, REFRESH_INTERVAL);
        });

        function formatCurrency(num) {
            return num.toLocaleString('ru-RU') + ' ₸';
        }

        function formatNumber(num) {
            if (num === 0) return '0';
            return num.toLocaleString('ru-RU');
        }

        function parseDate(dateStr) {
            if (!dateStr) return new Date();
            if (dateStr.includes('T')) return new Date(dateStr);
            const parts = dateStr.split(' ');
            const dateParts = parts[0].split('.');
            const timeParts = parts[1] ? parts[1].split(':') : [0,0,0];
            return new Date(
                parseInt(dateParts[2]),
                parseInt(dateParts[1]) - 1,
                parseInt(dateParts[0]),
                parseInt(timeParts[0]) || 0,
                parseInt(timeParts[1]) || 0,
                parseInt(timeParts[2]) || 0
            );
        }

        async function fetchAndRender() {
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error(`Ошибка HTTP`);
                const rawData = await response.json();
                
                if (Array.isArray(rawData) && rawData.length > 0) {
                    allTransactions = rawData.map(item => ({
                        date: item.date,
                        type: item.type,
                        category: item.category,
                        amount: Number(item.amount) || 0,
                        dateObj: parseDate(item.date)
                    })).sort((a, b) => a.dateObj - b.dateObj);
                    
                    applyFilter();
                }

                if (isFirstLoad) {
                    const toast = document.getElementById('loadingToast');
                    toast.classList.remove('show');
                    isFirstLoad = false;
                }
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                if (isFirstLoad) {
                    document.getElementById('loadingToast').querySelector('span').innerText = 'Ошибка соединения';
                    document.getElementById('loadingToast').querySelector('.spinner').style.display = 'none';
                }
            }
        }

        function applyFilter() {
            let filtered = allTransactions;
            const startDateVal = document.getElementById('startDate').value;
            const endDateVal = document.getElementById('endDate').value;

            if (startDateVal || endDateVal) {
                let start = startDateVal ? new Date(startDateVal) : new Date('2000-01-01');
                start.setHours(0, 0, 0, 0);
                
                let end = endDateVal ? new Date(endDateVal) : new Date('2100-01-01');
                end.setHours(23, 59, 59, 999);

                filtered = allTransactions.filter(t => t.dateObj >= start && t.dateObj <= end);
            }

            updateDashboard(filtered);
        }

        function updateDashboard(transactions) {
            const tableWrapper = document.getElementById('tableWrapper');
            const scrollTop = tableWrapper ? tableWrapper.scrollTop : 0;
            const scrollLeft = tableWrapper ? tableWrapper.scrollLeft : 0;

            let totalIncome = 0;
            let totalExpense = 0;
            const expenseByCategory = {};

            transactions.forEach(t => {
                if (t.type === 'Приход') totalIncome += t.amount;
                if (t.type === 'Расход') {
                    totalExpense += t.amount;
                    expenseByCategory[t.category] = (expenseByCategory[t.category] || 0) + t.amount;
                }
            });
            const balance = totalIncome - totalExpense;

            // Обновляем KPI и снимаем классы skeleton
            const kpiInc = document.getElementById('kpiIncome');
            const kpiExp = document.getElementById('kpiExpense');
            const kpiBal = document.getElementById('kpiBalance');
            
            kpiInc.classList.remove('skeleton');
            kpiExp.classList.remove('skeleton');
            kpiBal.classList.remove('skeleton');

            kpiInc.textContent = formatCurrency(totalIncome);
            kpiExp.textContent = formatCurrency(totalExpense);
            kpiBal.textContent = formatCurrency(balance);
            
            // Цвет баланса: зеленый если плюс, красный если минус
            if (balance >= 0) {
                kpiBal.classList.add('val-income');
                kpiBal.classList.remove('val-expense');
            } else {
                kpiBal.classList.add('val-expense');
                kpiBal.classList.remove('val-income');
            }

            // Топ-5 расходов
            const sortedExpenses = Object.entries(expenseByCategory)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);
                
            const topExpensesList = document.getElementById('topExpensesList');
            let topHtml = '';
            
            if (sortedExpenses.length === 0) {
                topHtml = '<div style="color: var(--text-tertiary); text-align: center; font-size: 14px; padding: 10px;">Нет данных</div>';
            } else {
                const maxExpense = sortedExpenses[0][1] || 1;
                sortedExpenses.forEach(e => {
                    const name = e[0];
                    const val = e[1];
                    const percent = ((val / maxExpense) * 100).toFixed(0);
                    topHtml += `
                        <div class="expense-item">
                            <div class="expense-meta">
                                <span class="expense-name">${name}</span>
                                <span class="expense-val">${formatCurrency(val)}</span>
                            </div>
                            <div class="expense-bar-bg">
                                <div class="expense-bar-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                });
            }
            topExpensesList.innerHTML = topHtml;

            // Группировка данных для таблицы
            const dailyMap = {};
            transactions.forEach(t => {
                const dateStr = t.dateObj.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
                
                if (!dailyMap[dateStr]) {
                    dailyMap[dateStr] = {
                        dateObj: new Date(t.dateObj.getFullYear(), t.dateObj.getMonth(), t.dateObj.getDate()),
                        dateStr: dateStr,
                        income: 0,
                        expense: 0,
                        cats: {}
                    };
                    EXPENSE_CATEGORIES.forEach(c => dailyMap[dateStr].cats[c] = 0);
                }

                if (t.type === 'Приход') {
                    dailyMap[dateStr].income += t.amount;
                } else if (t.type === 'Расход') {
                    dailyMap[dateStr].expense += t.amount;
                    if (EXPENSE_CATEGORIES.includes(t.category)) {
                        dailyMap[dateStr].cats[t.category] += t.amount;
                    } else {
                        dailyMap[dateStr].cats['Другие'] += t.amount;
                    }
                }
            });

            const dailyArray = Object.values(dailyMap).sort((a, b) => b.dateObj - a.dateObj);

            // Подсчет Итого
            let sumIncome = 0;
            let sumExpense = 0;
            let sumCats = {};
            EXPENSE_CATEGORIES.forEach(c => sumCats[c] = 0);

            dailyArray.forEach(day => {
                sumIncome += day.income;
                sumExpense += day.expense;
                EXPENSE_CATEGORIES.forEach(c => sumCats[c] += day.cats[c]);
            });
            let sumBalance = sumIncome - sumExpense;

            let table = document.getElementById('transactionTable');
            
            // Построение таблицы (шапка)
            let theadHTML = `
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Приход</th>
                        <th>Расход</th>
                        <th>Остаток</th>
                        ${EXPENSE_CATEGORIES.map(c => `<th>${c}</th>`).join('')}
                    </tr>
                    <tr class="total-row">
                        <th>Итого</th>
                        <th class="val-income">${formatNumber(sumIncome)}</th>
                        <th class="val-expense">${formatNumber(sumExpense)}</th>
                        <th class="${sumBalance >= 0 ? 'val-income' : 'val-expense'}">${formatNumber(sumBalance)}</th>
                        ${EXPENSE_CATEGORIES.map(c => `<th>${formatNumber(sumCats[c])}</th>`).join('')}
                    </tr>
                </thead>
                <tbody>
            `;

            // Построение таблицы (тело)
            let tbodyHTML = '';
            if (dailyArray.length === 0) {
                tbodyHTML = `<tr><td colspan="${4 + EXPENSE_CATEGORIES.length}" style="text-align:center; padding: 40px; color: var(--text-tertiary);">Нет операций за выбранный период</td></tr>`;
            } else {
                dailyArray.forEach(day => {
                    let dayBalance = day.income - day.expense;
                    tbodyHTML += `
                        <tr>
                            <td>${day.dateStr}</td>
                            <td class="val-income">${formatNumber(day.income)}</td>
                            <td class="val-expense">${formatNumber(day.expense)}</td>
                            <td class="${dayBalance >= 0 ? 'val-income' : 'val-expense'}" style="font-weight: 600;">${formatNumber(dayBalance)}</td>
                            ${EXPENSE_CATEGORIES.map(c => `<td>${formatNumber(day.cats[c])}</td>`).join('')}
                        </tr>
                    `;
                });
            }
            tbodyHTML += `</tbody>`;
            
            // Вставляем сгенерированный HTML (скелетоны автоматически заменятся на данные)
            table.innerHTML = theadHTML + tbodyHTML;

            // Восстановление позиции прокрутки (плавный UX при фоновом обновлении)
            if (tableWrapper) {
                tableWrapper.scrollTop = scrollTop;
                tableWrapper.scrollLeft = scrollLeft;
            }
        }
    </script>
</body>
</html>
