<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет финансов Evrozabor Luxe</title>
    <style>
        /* =========================================================
           CSS VARIABLES — единая дизайн-система
        ========================================================= */
        :root {
            /* Цвета поверхностей */
            --bg-page: #f0f2f5;
            --bg-card: #ffffff;
            --bg-card-hover: #fafbfc;
            --bg-subtle: #f7f8fa;
            --bg-overlay: rgba(255,255,255,0.85);

            /* Границы */
            --border-base: #e4e7ec;
            --border-light: #eef0f3;
            --border-focus: #6366f1;

            /* Текст */
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --text-inverse: #ffffff;

            /* Смысловые цвета */
            --income-100: #f0fdf4;
            --income-200: #bbf7d0;
            --income-500: #22c55e;
            --income-600: #16a34a;
            --income-700: #15803d;

            --expense-100: #fff1f2;
            --expense-200: #fecdd3;
            --expense-500: #f43f5e;
            --expense-600: #e11d48;
            --expense-700: #be123c;

            --balance-100: #eff6ff;
            --balance-200: #bfdbfe;
            --balance-500: #3b82f6;
            --balance-600: #2563eb;
            --balance-700: #1d4ed8;

            --accent-100: #eef2ff;
            --accent-500: #6366f1;
            --accent-600: #4f46e5;

            /* Нейтральные */
            --neutral-50:  #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-200: #e5e7eb;
            --neutral-300: #d1d5db;
            --neutral-400: #9ca3af;
            --neutral-500: #6b7280;
            --neutral-600: #4b5563;
            --neutral-700: #374151;
            --neutral-900: #111827;

            /* Тени */
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-focus: 0 0 0 3px rgba(99,102,241,0.15);

            /* Радиусы */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            /* Шрифт */
            --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            --font-mono: "SF Mono", "Fira Code", "Fira Mono", monospace;

            /* Анимации */
            --transition-fast: 120ms ease;
            --transition-base: 200ms ease;
            --transition-slow: 350ms ease;
        }

        /* =========================================================
           RESET & BASE
        ========================================================= */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font);
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 20px 40px;
        }

        /* =========================================================
           LAYOUT
        ========================================================= */
        .dashboard {
            max-width: 1680px;
            margin: 0 auto;
        }

        /* =========================================================
           HEADER
        ========================================================= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-500), var(--balance-600));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(99,102,241,0.25);
            flex-shrink: 0;
        }

        .brand-text h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .brand-text p {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 1px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* =========================================================
           DATE FILTER
        ========================================================= */
        .date-filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            padding: 5px 5px 5px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-base);
            box-shadow: var(--shadow-xs);
            transition: border-color var(--transition-base), box-shadow var(--transition-base);
        }

        .date-filter-group:focus-within {
            border-color: var(--accent-500);
            box-shadow: var(--shadow-focus);
        }

        .date-filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .date-filter-group input[type="date"] {
            border: none;
            padding: 7px 6px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            background: transparent;
            outline: none;
            width: 126px;
            cursor: pointer;
        }

        .date-filter-group input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0.45;
            padding: 3px;
            cursor: pointer;
        }

        .date-separator {
            color: var(--neutral-300);
            font-size: 14px;
        }

        .date-filter-actions {
            display: flex;
            gap: 4px;
            margin-left: 4px;
        }

        /* =========================================================
           BUTTONS
        ========================================================= */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition-base);
            white-space: nowrap;
            line-height: 1;
        }

        .btn-primary {
            background: var(--accent-500);
            color: var(--text-inverse);
            box-shadow: 0 1px 2px rgba(99,102,241,0.25);
        }

        .btn-primary:hover {
            background: var(--accent-600);
            box-shadow: 0 3px 8px rgba(99,102,241,0.35);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover {
            background: var(--neutral-100);
            color: var(--text-primary);
        }

        .btn-danger-ghost {
            background: transparent;
            color: var(--expense-600);
        }

        .btn-danger-ghost:hover {
            background: var(--expense-100);
        }

        .btn-outline {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-base);
            box-shadow: var(--shadow-xs);
        }

        .btn-outline:hover {
            background: var(--bg-subtle);
            color: var(--text-primary);
            border-color: var(--neutral-300);
        }

        .btn-outline:active {
            transform: scale(0.97);
        }

        /* Refresh button */
        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-md);
            padding: 9px 16px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-xs);
            white-space: nowrap;
        }

        .refresh-btn:hover {
            background: var(--bg-subtle);
            border-color: var(--neutral-300);
            color: var(--text-primary);
        }

        .refresh-btn:active {
            transform: scale(0.97);
        }

        .refresh-icon {
            display: inline-block;
            font-size: 15px;
            transition: transform 0.7s ease;
        }

        .refresh-btn.spinning .refresh-icon {
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-md);
            padding: 9px 14px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            box-shadow: var(--shadow-xs);
            transition: all var(--transition-base);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--income-500);
            flex-shrink: 0;
            transition: background var(--transition-base);
        }

        .status-pill.loading .status-dot {
            background: var(--accent-500);
            animation: pulse-dot 1.2s ease-in-out infinite;
        }

        .status-pill.error .status-dot {
            background: var(--expense-500);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* =========================================================
           TOP LAYOUT
        ========================================================= */
        .top-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* =========================================================
           KPI CARDS
        ========================================================= */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .kpi-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            cursor: default;
            transition: transform var(--transition-base), box-shadow var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .kpi-card.income::before  { background: linear-gradient(90deg, var(--income-500), var(--income-600)); }
        .kpi-card.expense::before { background: linear-gradient(90deg, var(--expense-500), var(--expense-600)); }
        .kpi-card.balance::before { background: linear-gradient(90deg, var(--balance-500), var(--balance-600)); }

        .kpi-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .kpi-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .kpi-card.income .kpi-icon  { background: var(--income-100); }
        .kpi-card.expense .kpi-icon { background: var(--expense-100); }
        .kpi-card.balance .kpi-icon { background: var(--balance-100); }

        .kpi-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .kpi-badge.up {
            background: var(--income-100);
            color: var(--income-700);
        }

        .kpi-badge.down {
            background: var(--expense-100);
            color: var(--expense-700);
        }

        .kpi-badge.neutral {
            background: var(--neutral-100);
            color: var(--neutral-600);
        }

        .kpi-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 30px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        .kpi-card.income  .kpi-value { color: var(--income-600); }
        .kpi-card.expense .kpi-value { color: var(--expense-600); }
        .kpi-card.balance .kpi-value { color: var(--balance-600); }

        .kpi-sub {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* =========================================================
           KPI SKELETON
        ========================================================= */
        .skeleton {
            background: linear-gradient(90deg, var(--neutral-100) 25%, var(--neutral-50) 50%, var(--neutral-100) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-kpi-value {
            height: 36px;
            width: 140px;
            margin-top: 4px;
        }

        .skeleton-kpi-label {
            height: 12px;
            width: 80px;
            margin-bottom: 8px;
        }

        .skeleton-bar {
            height: 6px;
            border-radius: 3px;
            margin-top: 4px;
        }

        /* =========================================================
           TOP EXPENSES CARD
        ========================================================= */
        .top-expenses-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 22px 22px 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .card-badge {
            background: var(--neutral-100);
            color: var(--neutral-500);
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .expense-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .expense-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .expense-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .expense-rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 6px;
            background: var(--neutral-100);
            color: var(--neutral-500);
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .expense-item:nth-child(1) .expense-rank {
            background: #fef3c7;
            color: #92400e;
        }

        .expense-item:nth-child(2) .expense-rank {
            background: var(--neutral-200);
            color: var(--neutral-600);
        }

        .expense-item:nth-child(3) .expense-rank {
            background: #fde8d8;
            color: #9a3412;
        }

        .expense-left {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .expense-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .expense-val {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        .expense-bar-bg {
            background: var(--neutral-100);
            height: 5px;
            border-radius: 3px;
            overflow: hidden;
        }

        .expense-bar-fill {
            background: linear-gradient(90deg, var(--expense-500), var(--expense-600));
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .expense-item:nth-child(1) .expense-bar-fill {
            background: linear-gradient(90deg, #f59e0b, #d97706);
        }

        /* =========================================================
           SECTION DIVIDER
        ========================================================= */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* =========================================================
           TABLE CARD
        ========================================================= */
        .table-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 22px 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .table-wrapper {
            max-height: 560px;
            overflow: auto;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
        }

        /* Scrollbar */
        .table-wrapper::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: var(--neutral-50);
            border-radius: 3px;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--neutral-300);
            border-radius: 3px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: var(--neutral-400);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 20;
        }

        th {
            background: var(--neutral-50);
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 12px 14px;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-base);
            border-right: 1px solid var(--border-light);
            text-align: right;
        }

        th:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            z-index: 30;
            background: var(--neutral-50);
            box-shadow: 2px 0 4px rgba(0,0,0,0.04);
        }

        /* ИТОГО-строка */
        .total-row th {
            background: var(--neutral-100);
            color: var(--text-primary);
            font-weight: 800;
            font-size: 12px;
            text-transform: none;
            letter-spacing: 0;
            border-bottom: 2px solid var(--border-base);
            padding: 13px 14px;
        }

        .total-row th:first-child {
            background: var(--neutral-100);
            z-index: 30;
        }

        td {
            padding: 11px 14px;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-light);
            border-right: 1px solid var(--border-light);
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            color: var(--text-primary);
            transition: background var(--transition-fast);
        }

        td:first-child {
            position: sticky;
            left: 0;
            text-align: left;
            font-weight: 700;
            background: #fff;
            box-shadow: 2px 0 4px rgba(0,0,0,0.03);
            font-size: 12px;
            color: var(--text-secondary);
        }

        tbody tr:hover td {
            background: var(--neutral-50);
        }

        tbody tr:hover td:first-child {
            background: var(--neutral-100);
        }

        /* Нет данных */
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* =========================================================
           EMPTY / LOADING STATE
        ========================================================= */
        .loading-placeholder {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* =========================================================
           UTILITIES
        ========================================================= */
        .text-income  { color: var(--income-600) !important; }
        .text-expense { color: var(--expense-600) !important; }
        .text-balance-pos { color: var(--balance-600) !important; }
        .text-balance-neg { color: var(--expense-600) !important; }

        /* =========================================================
           RESPONSIVE
        ========================================================= */
        @media (max-width: 1200px) {
            .top-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 900px) {
            .kpi-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            .kpi-value {
                font-size: 22px;
            }

            .kpi-badge {
                display: none;
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 12px 12px 32px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
                margin-bottom: 20px;
            }

            .header-controls {
                flex-direction: column;
                gap: 8px;
            }

            .date-filter-group {
                flex-wrap: wrap;
                padding: 8px 12px;
                gap: 8px;
            }

            .date-filter-group input[type="date"] {
                width: calc(50% - 12px);
            }

            .date-filter-actions {
                width: 100%;
                margin-left: 0;
            }

            .date-filter-actions .btn {
                flex: 1;
            }

            .refresh-btn,
            .status-pill {
                justify-content: center;
            }

            .kpi-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .kpi-card {
                flex-direction: row;
                align-items: center;
                padding: 16px 18px;
            }

            .kpi-top {
                margin-bottom: 0;
                flex-direction: row;
                align-items: center;
                gap: 12px;
            }

            .kpi-bottom {
                display: flex;
                flex-direction: column;
                flex: 1;
            }

            .kpi-value {
                font-size: 24px;
            }

            .table-card {
                padding: 14px 12px;
                border-radius: var(--radius-lg);
            }

            th, td {
                padding: 10px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <div class="header-brand">
                <div class="brand-icon">📊</div>
                <div class="brand-text">
                    <h1>Evrozabor Luxe</h1>
                    <p>Финансовый дашборд</p>
                </div>
            </div>

            <div class="header-controls">
                <!-- Фильтр дат -->
                <div class="date-filter-group">
                    <label for="dateFrom">С</label>
                    <input type="date" id="dateFrom" />
                    <span class="date-separator">—</span>
                    <label for="dateTo">По</label>
                    <input type="date" id="dateTo" />
                    <div class="date-filter-actions">
                        <button class="btn btn-primary" id="applyDateBtn">Применить</button>
                        <button class="btn btn-danger-ghost" id="clearDateBtn">Сбросить</button>
                    </div>
                </div>

                <!-- Кнопка обновления -->
                <button class="refresh-btn" id="refreshBtn">
                    <span class="refresh-icon">↻</span>
                    <span>Обновить</span>
                </button>

                <!-- Статус -->
                <div class="status-pill" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span id="statusText">Загрузка...</span>
                </div>
            </div>
        </div>

        <!-- ===== TOP: KPI + TOP EXPENSES ===== -->
        <div class="top-layout">
            <!-- KPI -->
            <div class="kpi-grid" id="kpiContainer">
                <!-- Skeleton state -->
                <div class="kpi-card income">
                    <div class="kpi-top">
                        <div class="kpi-icon">💰</div>
                        <div class="skeleton skeleton-kpi-label" style="width:60px;height:12px;"></div>
                    </div>
                    <div class="kpi-label">Доходы</div>
                    <div class="skeleton skeleton-kpi-value"></div>
                </div>
                <div class="kpi-card expense">
                    <div class="kpi-top">
                        <div class="kpi-icon">💸</div>
                        <div class="skeleton skeleton-kpi-label" style="width:60px;height:12px;"></div>
                    </div>
                    <div class="kpi-label">Расходы</div>
                    <div class="skeleton skeleton-kpi-value"></div>
                </div>
                <div class="kpi-card balance">
                    <div class="kpi-top">
                        <div class="kpi-icon">📈</div>
                        <div class="skeleton skeleton-kpi-label" style="width:60px;height:12px;"></div>
                    </div>
                    <div class="kpi-label">Остаток</div>
                    <div class="skeleton skeleton-kpi-value"></div>
                </div>
            </div>

            <!-- Топ расходов -->
            <div class="top-expenses-card">
                <div class="card-header">
                    <div class="card-title">Топ расходов</div>
                    <div class="card-badge" id="topExpensesBadge">5</div>
                </div>
                <div class="expense-list" id="topExpensesList">
                    <!-- Skeleton -->
                    <div class="expense-item">
                        <div class="expense-meta">
                            <div class="skeleton" style="width:110px;height:13px;border-radius:4px;"></div>
                            <div class="skeleton" style="width:70px;height:13px;border-radius:4px;"></div>
                        </div>
                        <div class="expense-bar-bg"><div class="skeleton" style="width:90%;height:5px;border-radius:3px;animation:none;background:var(--neutral-200);"></div></div>
                    </div>
                    <div class="expense-item">
                        <div class="expense-meta">
                            <div class="skeleton" style="width:90px;height:13px;border-radius:4px;"></div>
                            <div class="skeleton" style="width:60px;height:13px;border-radius:4px;"></div>
                        </div>
                        <div class="expense-bar-bg"><div class="skeleton" style="width:70%;height:5px;border-radius:3px;animation:none;background:var(--neutral-200);"></div></div>
                    </div>
                    <div class="expense-item">
                        <div class="expense-meta">
                            <div class="skeleton" style="width:100px;height:13px;border-radius:4px;"></div>
                            <div class="skeleton" style="width:65px;height:13px;border-radius:4px;"></div>
                        </div>
                        <div class="expense-bar-bg"><div class="skeleton" style="width:55%;height:5px;border-radius:3px;animation:none;background:var(--neutral-200);"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== TABLE ===== -->
        <div class="table-card">
            <div class="card-header" style="margin-bottom: 16px;">
                <div class="card-title">Операции по дням</div>
                <div class="card-badge" id="rowCountBadge">—</div>
            </div>
            <div class="table-wrapper">
                <table id="transactionTable"></table>
            </div>
        </div>
    </div>

    <script>
        /* ============================================================
           CONFIG
        ============================================================ */
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeevuA1MTvQ09j-qcUWTPhArFe6k4Szilx6DB1kzEcnceA3ETJ1636AUpj8tRpldiZ8w/exec';

        const EXPENSE_CATEGORIES = [
            'Материал', 'Заливка', 'Установка', 'Доставка', 'Аренда', 'Зарплата',
            'Ремонт', 'Кредит', 'Обед', 'Проезд', 'Личные расходы',
            'Бензин Бакытжан', 'Коммунальные услуги', 'Расходники', 'Другие'
        ];

        let allTransactions = [];

        /* ============================================================
           DOM REFS
        ============================================================ */
        const dateFrom        = document.getElementById('dateFrom');
        const dateTo          = document.getElementById('dateTo');
        const applyDateBtn    = document.getElementById('applyDateBtn');
        const clearDateBtn    = document.getElementById('clearDateBtn');
        const refreshBtn      = document.getElementById('refreshBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText      = document.getElementById('statusText');

        /* ============================================================
           HELPERS
        ============================================================ */
        function formatCurrency(num) {
            return num.toLocaleString('ru-RU') + ' ₸';
        }

        function formatNumber(num) {
            return num === 0 ? '—' : num.toLocaleString('ru-RU');
        }

        function formatNumberRaw(num) {
            return num === 0 ? '0' : num.toLocaleString('ru-RU');
        }

        function parseDate(dateStr) {
            if (!dateStr) return new Date();
            if (dateStr.includes('T')) return new Date(dateStr);
            const parts = dateStr.split(' ');
            const d = parts[0].split('.');
            const t = parts[1] ? parts[1].split(':') : [0, 0, 0];
            return new Date(+d[2], +d[1] - 1, +d[0], +t[0] || 0, +t[1] || 0, +t[2] || 0);
        }

        function setStatus(text, state = 'ok') {
            statusText.textContent = text;
            statusIndicator.classList.remove('loading', 'error');
            if (state !== 'ok') statusIndicator.classList.add(state);
        }

        /* ============================================================
           FETCH
        ============================================================ */
        async function fetchData() {
            refreshBtn.classList.add('spinning');
            setStatus('Загрузка...', 'loading');

            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const raw = await response.json();
                if (!Array.isArray(raw) || raw.length === 0) throw new Error('Пустой ответ');

                allTransactions = raw.map(item => ({
                    date:    item.date,
                    type:    item.type,
                    category: item.category,
                    amount:  Number(item.amount) || 0,
                    dateObj: parseDate(item.date)
                })).sort((a, b) => a.dateObj - b.dateObj);

                applyFilter();

                const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                setStatus(`Обновлено ${time}`, 'ok');
            } catch (err) {
                console.error(err);
                setStatus('Ошибка загрузки', 'error');
            } finally {
                refreshBtn.classList.remove('spinning');
            }
        }

        /* ============================================================
           FILTER
        ============================================================ */
        function getDateFilter() {
            let fromDate = null, toDate = null;
            if (dateFrom.value) {
                fromDate = new Date(dateFrom.value);
                fromDate.setHours(0, 0, 0, 0);
            }
            if (dateTo.value) {
                toDate = new Date(dateTo.value);
                toDate.setHours(23, 59, 59, 999);
            }
            return { fromDate, toDate };
        }

        function applyFilter() {
            const { fromDate, toDate } = getDateFilter();
            let filtered = allTransactions;
            if (fromDate) filtered = filtered.filter(t => t.dateObj >= fromDate);
            if (toDate)   filtered = filtered.filter(t => t.dateObj <= toDate);
            updateDashboard(filtered);
        }

        function clearDateFilter() {
            dateFrom.value = '';
            dateTo.value = '';
            localStorage.removeItem('evrozabor_dateFrom');
            localStorage.removeItem('evrozabor_dateTo');
            applyFilter();
        }

        /* ============================================================
           RENDER — KPI
        ============================================================ */
        function renderKPI(totalIncome, totalExpense) {
            const balance = totalIncome - totalExpense;
            const margin = totalIncome > 0
                ? ((balance / totalIncome) * 100).toFixed(1)
                : '0.0';
            const isProfit = balance >= 0;

            const badgeIncome  = `<span class="kpi-badge up">↑ Приход</span>`;
            const badgeExpense = `<span class="kpi-badge down">↓ Расход</span>`;
            const badgeBalance = isProfit
                ? `<span class="kpi-badge up">+${margin}%</span>`
                : `<span class="kpi-badge down">${margin}%</span>`;

            document.getElementById('kpiContainer').innerHTML = `
                <div class="kpi-card income">
                    <div class="kpi-top">
                        <div class="kpi-icon">💰</div>
                        ${badgeIncome}
                    </div>
                    <div class="kpi-label">Доходы</div>
                    <div class="kpi-value">${formatCurrency(totalIncome)}</div>
                    <div class="kpi-sub">Все поступления за период</div>
                </div>
                <div class="kpi-card expense">
                    <div class="kpi-top">
                        <div class="kpi-icon">💸</div>
                        ${badgeExpense}
                    </div>
                    <div class="kpi-label">Расходы</div>
                    <div class="kpi-value">${formatCurrency(totalExpense)}</div>
                    <div class="kpi-sub">Суммарные затраты за период</div>
                </div>
                <div class="kpi-card balance">
                    <div class="kpi-top">
                        <div class="kpi-icon">${isProfit ? '📈' : '📉'}</div>
                        ${badgeBalance}
                    </div>
                    <div class="kpi-label">Остаток</div>
                    <div class="kpi-value" style="color: var(--${isProfit ? 'balance' : 'expense'}-600);">${formatCurrency(balance)}</div>
                    <div class="kpi-sub">${isProfit ? 'Прибыль' : 'Убыток'} · маржа ${Math.abs(+margin)}%</div>
                </div>
            `;
        }

        /* ============================================================
           RENDER — TOP EXPENSES
        ============================================================ */
        function renderTopExpenses(expenseByCategory) {
            const sorted = Object.entries(expenseByCategory)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const list = document.getElementById('topExpensesList');
            document.getElementById('topExpensesBadge').textContent = sorted.length;

            list.innerHTML = '';

            if (sorted.length === 0) {
                list.innerHTML = '<div style="color:var(--text-tertiary);text-align:center;padding:24px 0;font-size:13px;">Нет расходов</div>';
                return;
            }

            const max = sorted[0][1] || 1;

            sorted.forEach(([name, val], idx) => {
                const pct = ((val / max) * 100).toFixed(1);
                const el = document.createElement('div');
                el.className = 'expense-item';
                el.innerHTML = `
                    <div class="expense-meta">
                        <div class="expense-left">
                            <span class="expense-rank">${idx + 1}</span>
                            <span class="expense-name">${name}</span>
                        </div>
                        <span class="expense-val">${formatCurrency(val)}</span>
                    </div>
                    <div class="expense-bar-bg">
                        <div class="expense-bar-fill" style="width:0%"></div>
                    </div>
                `;
                list.appendChild(el);
                // Animate bar
                requestAnimationFrame(() => {
                    const fill = el.querySelector('.expense-bar-fill');
                    if (fill) setTimeout(() => fill.style.width = pct + '%', 50 + idx * 60);
                });
            });
        }

        /* ============================================================
           RENDER — TABLE
        ============================================================ */
        function renderTable(dailyArray, sumIncome, sumExpense, sumCats) {
            const balance = sumIncome - sumExpense;
            const table = document.getElementById('transactionTable');
            const rowCount = document.getElementById('rowCountBadge');
            rowCount.textContent = dailyArray.length + ' дн.';

            const catHeaders = EXPENSE_CATEGORIES.map(c => `<th>${c}</th>`).join('');
            const catTotals  = EXPENSE_CATEGORIES.map(c =>
                `<th>${sumCats[c] > 0 ? formatNumberRaw(sumCats[c]) : '<span style="color:var(--neutral-300)">—</span>'}</th>`
            ).join('');

            let thead = `
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Приход</th>
                        <th>Расход</th>
                        <th>Остаток</th>
                        ${catHeaders}
                    </tr>
                    <tr class="total-row">
                        <th>Итого</th>
                        <th class="text-income">${formatNumberRaw(sumIncome)}</th>
                        <th class="text-expense">${formatNumberRaw(sumExpense)}</th>
                        <th class="${balance >= 0 ? 'text-balance-pos' : 'text-expense'}">${formatNumberRaw(balance)}</th>
                        ${catTotals}
                    </tr>
                </thead>
            `;

            let tbody = '<tbody>';

            if (dailyArray.length === 0) {
                const span = 4 + EXPENSE_CATEGORIES.length;
                tbody += `<tr class="empty-row"><td colspan="${span}">Нет данных за выбранный период</td></tr>`;
            } else {
                dailyArray.forEach(day => {
                    const dayBal = day.income - day.expense;
                    const catCells = EXPENSE_CATEGORIES.map(c =>
                        `<td>${day.cats[c] > 0 ? formatNumberRaw(day.cats[c]) : '<span style="color:var(--neutral-300)">—</span>'}</td>`
                    ).join('');

                    tbody += `
                        <tr>
                            <td>${day.dateStr}</td>
                            <td class="text-income" style="font-weight:600">${day.income > 0 ? formatNumberRaw(day.income) : '<span style="color:var(--neutral-300)">—</span>'}</td>
                            <td class="text-expense" style="font-weight:600">${day.expense > 0 ? formatNumberRaw(day.expense) : '<span style="color:var(--neutral-300)">—</span>'}</td>
                            <td class="${dayBal >= 0 ? 'text-balance-pos' : 'text-expense'}" style="font-weight:700">${formatNumberRaw(dayBal)}</td>
                            ${catCells}
                        </tr>
                    `;
                });
            }

            tbody += '</tbody>';
            table.innerHTML = thead + tbody;
        }

        /* ============================================================
           MAIN UPDATE
        ============================================================ */
        function updateDashboard(transactions) {
            let totalIncome = 0, totalExpense = 0;
            const expenseByCategory = {};

            transactions.forEach(t => {
                if (t.type === 'Приход') {
                    totalIncome += t.amount;
                } else if (t.type === 'Расход') {
                    totalExpense += t.amount;
                    expenseByCategory[t.category] = (expenseByCategory[t.category] || 0) + t.amount;
                }
            });

            renderKPI(totalIncome, totalExpense);
            renderTopExpenses(expenseByCategory);

            // Build daily map
            const dailyMap = {};
            transactions.forEach(t => {
                const key = t.dateObj.toLocaleDateString('ru-RU', {
                    day: '2-digit', month: '2-digit', year: 'numeric'
                });

                if (!dailyMap[key]) {
                    dailyMap[key] = {
                        dateObj: new Date(t.dateObj.getFullYear(), t.dateObj.getMonth(), t.dateObj.getDate()),
                        dateStr: key,
                        income: 0,
                        expense: 0,
                        cats: {}
                    };
                    EXPENSE_CATEGORIES.forEach(c => dailyMap[key].cats[c] = 0);
                }

                const d = dailyMap[key];
                if (t.type === 'Приход') {
                    d.income += t.amount;
                } else if (t.type === 'Расход') {
                    d.expense += t.amount;
                    const cat = EXPENSE_CATEGORIES.includes(t.category) ? t.category : 'Другие';
                    d.cats[cat] += t.amount;
                }
            });

            const dailyArray = Object.values(dailyMap).sort((a, b) => b.dateObj - a.dateObj);

            // Totals for header row
            let sumIncome = 0, sumExpense = 0;
            const sumCats = {};
            EXPENSE_CATEGORIES.forEach(c => sumCats[c] = 0);
            dailyArray.forEach(day => {
                sumIncome  += day.income;
                sumExpense += day.expense;
                EXPENSE_CATEGORIES.forEach(c => sumCats[c] += day.cats[c]);
            });

            renderTable(dailyArray, sumIncome, sumExpense, sumCats);
        }

        /* ============================================================
           EVENTS
        ============================================================ */
        applyDateBtn.addEventListener('click', () => {
            localStorage.setItem('evrozabor_dateFrom', dateFrom.value);
            localStorage.setItem('evrozabor_dateTo', dateTo.value);
            applyFilter();
        });

        clearDateBtn.addEventListener('click', clearDateFilter);
        refreshBtn.addEventListener('click', fetchData);

        dateFrom.addEventListener('change', () => localStorage.setItem('evrozabor_dateFrom', dateFrom.value));
        dateTo.addEventListener('change',   () => localStorage.setItem('evrozabor_dateTo', dateTo.value));

        /* ============================================================
           INIT
        ============================================================ */
        window.addEventListener('DOMContentLoaded', () => {
            const savedFrom = localStorage.getItem('evrozabor_dateFrom');
            const savedTo   = localStorage.getItem('evrozabor_dateTo');
            if (savedFrom) dateFrom.value = savedFrom;
            if (savedTo)   dateTo.value   = savedTo;
            fetchData();
        });

        console.log('📊 Evrozabor Luxe Dashboard v3.0 — Premium SaaS UI');
    </script>
</body>
</html>
