<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет финансов Evrozabor Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ================= CSS ПЕРЕМЕННЫЕ (ДИЗАЙН-СИСТЕМА) ================= */
        :root {
            /* Нейтральные цвета (основа) */
            --bg-app: #FAFBFC;
            --bg-card: #FFFFFF;
            --bg-hover: #F0F4F8;
            --bg-subtle: #F7F9FB;
            
            /* Текстовые цвета */
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-tertiary: #94A3B8;
            --text-muted: #CBD5E1;
            
            /* Границы */
            --border-light: #E0E7FF;
            --border-hover: #C7D2FE;
            
            /* Основная палитра (монохроматическая с фиолетовым) */
            --accent-primary: #6366F1;      /* Основной фиолетовый */
            --accent-primary-light: #818CF8; /* Светлый фиолетовый */
            --accent-primary-lighter: #EEF2FF; /* Очень светлый фиолетовый */
            --accent-primary-hover: #4F46E5; /* Темный фиолетовый для hover */
            --accent-primary-dark: #4C1D95; /* Очень темный для контраста */
            
            /* Цвета для данных (гармоничная триада) */
            --color-income: #10B981;        /* Зеленый - доходы */
            --color-income-light: #D1FAE5; /* Светлый зеленый */
            --color-expense: #EF4444;       /* Красный - расходы */
            --color-expense-light: #FEE2E2; /* Светлый красный */
            --color-balance: #6366F1;       /* Основной фиолетовый для остатка */
            --color-balance-light: #EEF2FF;
            
            /* Дополнительные цвета (для градиентов и деталей) */
            --color-accent-warm: #F59E0B;   /* Янтарный (для выделения) */
            --color-accent-cool: #06B6D4;   /* Циан (для дополнительных элементов) */
            
            /* Тени (более утонченные) */
            --shadow-xs: 0 1px 2px 0 rgba(15, 23, 42, 0.03);
            --shadow-sm: 0 1px 3px 0 rgba(15, 23, 42, 0.06), 0 1px 2px 0 rgba(15, 23, 42, 0.03);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.02);
            --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -2px rgba(15, 23, 42, 0.03);
            --shadow-float: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 10px 10px -5px rgba(15, 23, 42, 0.04);
            --shadow-sticky: 4px 0 12px rgba(15, 23, 42, 0.03);
            
            /* Размеры */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            
            /* Переходы */
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ================= БАЗОВЫЕ СТИЛИ ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-app) 0%, var(--accent-primary-lighter) 100%);
            color: var(--text-primary);
            padding: 24px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        .dashboard {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ================= ШАПКА И ФИЛЬТРЫ ================= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 8px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-primary-hover) 100%);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--shadow-md);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-filter-group {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            padding: 8px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
        }

        .date-filter-group:focus-within {
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(238, 242, 255, 0.95) 100%);
            box-shadow: 0 0 0 3px var(--accent-primary-lighter);
        }

        .date-input {
            border: none;
            background: transparent;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            border-radius: var(--radius-sm);
            transition: var(--transition-fast);
        }

        .date-input:hover {
            background: var(--bg-hover);
        }

        .date-separator {
            color: var(--text-tertiary);
            padding: 0 8px;
            font-weight: 500;
        }

        .btn-clear {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-fast);
        }

        .btn-clear:hover {
            background: var(--color-expense-light);
            color: var(--color-expense);
        }

        /* ================= МОБИЛЬНАЯ КНОПКА КАЛЕНДАРЯ ================= */
        .date-filter-mobile {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .date-filter-btn {
            width: 44px;
            height: 44px;
            border: 1px solid var(--border-light);
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-subtle) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .date-filter-btn:active {
            background: linear-gradient(135deg, var(--accent-primary-lighter) 0%, var(--bg-card) 100%);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-primary-lighter);
        }

        .date-filter-btn svg {
            color: var(--accent-primary);
            stroke-width: 2;
        }

        /* ================= DATE PICKER MODAL ================= */
        .date-picker-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(6px);
            z-index: 9998;
            animation: fadeIn 0.2s ease;
        }

        .date-picker-modal.open {
            display: flex;
            align-items: flex-end;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .date-picker-content {
            background: var(--bg-card);
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 32px;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .date-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .date-picker-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .date-picker-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            border-radius: var(--radius-sm);
        }

        .date-picker-close:active {
            color: var(--accent-primary);
            background: var(--accent-primary-lighter);
        }

        .date-picker-fields {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .date-picker-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .date-picker-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .date-picker-input {
            padding: 12px 16px;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--bg-subtle) 0%, var(--bg-card) 100%);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .date-picker-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px var(--accent-primary-lighter);
        }

        .date-picker-actions {
            display: flex;
            gap: 12px;
        }

        .date-picker-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .date-picker-btn-cancel {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .date-picker-btn-cancel:active {
            background: var(--border-light);
            color: var(--text-primary);
        }

        .date-picker-btn-apply {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-primary-hover) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .date-picker-btn-apply:active {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        /* ================= KPI КАРТОЧКИ ================= */
        .top-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            padding: 24px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border-hover);
        }

        /* Фоновый градиент для карточек (едва видимый) */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(99, 102, 241, 0.02) 100%);
            pointer-events: none;
        }

        .kpi-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        /* Цветные полоски сверху карточек */
        .kpi-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            background: var(--bar-color, var(--accent-primary));
        }
        
        .kpi-card.income::after { background: linear-gradient(90deg, var(--color-income) 0%, #34D399 100%); }
        .kpi-card.expense::after { background: linear-gradient(90deg, var(--color-expense) 0%, #FC5C65 100%); }
        .kpi-card.balance::after { background: linear-gradient(90deg, var(--accent-primary) 0%, var(--accent-primary-light) 100%); }

        .kpi-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kpi-label svg {
            opacity: 0.6;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            color: var(--text-primary);
        }

        .val-income { color: var(--color-income) !important; }
        .val-expense { color: var(--color-expense) !important; }
        .val-balance { background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-primary-dark) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* ================= ТОП РАСХОДОВ ================= */
        .top-expenses-card {
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .section-title svg {
            color: var(--accent-primary);
            opacity: 0.8;
        }

        .expense-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .expense-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--bg-subtle) 0%, transparent 100%);
            transition: var(--transition-fast);
        }

        .expense-item:hover {
            background: var(--bg-hover);
        }

        .expense-meta {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
        }

        .expense-name { color: var(--text-secondary); }
        .expense-val { color: var(--text-primary); font-variant-numeric: tabular-nums; font-weight: 600; }

        .expense-bar-bg {
            background: linear-gradient(90deg, var(--color-expense-light) 0%, var(--bg-hover) 100%);
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
        }

        .expense-bar-fill {
            background: linear-gradient(90deg, var(--color-expense) 0%, #FC6B7A 100%);
            height: 100%;
            border-radius: 999px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ================= ТАБЛИЦА ================= */
        .table-card {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-header-wrapper {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-subtle) 100%);
        }

        .table-wrapper {
            max-height: 600px;
            overflow: auto;
            position: relative;
            background: var(--bg-card);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 20;
        }

        th {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(238, 242, 255, 0.95) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 16px 20px;
            text-align: right;
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
        }

        td {
            padding: 16px 20px;
            white-space: nowrap;
            text-align: right;
            border-bottom: 1px solid var(--bg-hover);
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            transition: background var(--transition-fast);
        }

        th:first-child, td:first-child {
            position: sticky;
            left: 0;
            text-align: left;
            z-index: 10;
        }
        
        td:first-child {
            background: var(--bg-card);
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        th:first-child { z-index: 30; }

        th:first-child::after, td:first-child::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 1px;
            background: var(--border-light);
            box-shadow: var(--shadow-sticky);
        }

        .total-row th {
            background: linear-gradient(135deg, var(--accent-primary-lighter) 0%, var(--bg-hover) 100%);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
            text-transform: none;
            letter-spacing: 0;
            border-bottom: 2px solid var(--border-hover);
        }
        .total-row th:first-child { background: linear-gradient(135deg, var(--accent-primary-lighter) 0%, var(--bg-hover) 100%); z-index: 30;}

        tbody tr:hover td {
            background-color: linear-gradient(90deg, var(--bg-subtle) 0%, transparent 100%);
        }
        tbody tr:hover td:first-child {
            background-color: var(--bg-subtle);
        }

        /* ================= SKELETON LOADING ================= */
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-hover) 25%, var(--border-light) 50%, var(--bg-hover) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: var(--radius-sm);
            color: transparent !important;
            user-select: none;
        }

        .skeleton-block {
            display: block;
            width: 100%;
            height: 24px;
            margin-bottom: 8px;
        }

        /* Loading Toast */
        #loadingToast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-primary-dark) 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }
        
        #loadingToast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ================= МОБИЛЬНАЯ АДАПТАЦИЯ ================= */
        @media (max-width: 1024px) {
            .top-layout { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .dashboard { gap: 16px; }
            
            .header { 
                margin-bottom: 8px; 
                flex-direction: column; 
                align-items: stretch; 
                gap: 12px; 
            }
            .brand { justify-content: center; }
            .header h1 { font-size: 22px; }
            
            .header-controls { 
                flex-direction: row;
                width: 100%;
                gap: 8px;
            }

            .date-filter-group {
                display: none;
            }

            .btn-clear {
                display: none;
            }

            .date-filter-mobile {
                display: flex;
                width: 100%;
            }

            .date-filter-btn {
                width: 48px;
                height: 48px;
                flex-shrink: 0;
            }

            .kpi-grid { grid-template-columns: 1fr; gap: 12px; }
            .kpi-card { 
                padding: 20px; 
                flex-direction: row; 
                justify-content: space-between; 
                align-items: center;
            }
            .kpi-card::after {
                width: 4px;
                height: 100%;
                top: 0;
                left: 0;
                border-radius: 0;
            }
            .kpi-value { font-size: 24px; }
            
            .card { padding: 16px; border-radius: 16px; }
            .table-header-wrapper { padding: 16px; }
            th, td { padding: 14px 16px; font-size: 13px; }

            .date-picker-content {
                border-radius: 24px 24px 0 0;
                padding: 20px 16px 28px;
            }
        }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .header h1 { font-size: 20px; }
            
            .kpi-value { font-size: 20px; }
            .card { padding: 12px; }
            
            .date-picker-actions {
                flex-direction: column-reverse;
            }

            .date-picker-btn {
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

    <div id="loadingToast">
        <div class="spinner"></div>
        <span>Синхронизация данных...</span>
    </div>

    <!-- Date Picker Modal -->
    <div id="datePickerModal" class="date-picker-modal">
        <div class="date-picker-content">
            <div class="date-picker-header">
                <div class="date-picker-title">Выбрать период</div>
                <button class="date-picker-close" id="datePickerCloseBtn">✕</button>
            </div>
            <div class="date-picker-fields">
                <div class="date-picker-field">
                    <label class="date-picker-label">Дата от</label>
                    <input type="date" id="startDateModal" class="date-picker-input">
                </div>
                <div class="date-picker-field">
                    <label class="date-picker-label">Дата до</label>
                    <input type="date" id="endDateModal" class="date-picker-input">
                </div>
            </div>
            <div class="date-picker-actions">
                <button id="datePickerApplyBtn" class="date-picker-btn date-picker-btn-apply">Применить</button>
                <button id="datePickerCancelBtn" class="date-picker-btn date-picker-btn-cancel">Сбросить</button>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="header">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                </div>
                <h1>Evrozabor Luxe</h1>
            </div>
            
            <div class="header-controls">
                <!-- Десктопная версия -->
                <div class="date-filter-group">
                    <input type="date" id="startDate" class="date-input" title="Начальная дата">
                    <span class="date-separator">→</span>
                    <input type="date" id="endDate" class="date-input" title="Конечная дата">
                </div>
                <button id="clearDateBtn" class="btn-clear" title="Очистить">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    <span class="desktop-text">Сбросить</span>
                </button>

                <!-- Мобильная версия -->
                <div class="date-filter-mobile">
                    <button id="dateFilterBtnMobile" class="date-filter-btn" title="Фильтр по датам">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
                            <path d="M16 2v4"/>
                            <path d="M8 2v4"/>
                            <path d="M3 10h18"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="top-layout">
            <div class="kpi-grid">
                <div class="card kpi-card income">
                    <div class="kpi-label">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22M17 5H9.5a4 4 0 0 0 0 8h5a4 4 0 0 1 0 8H6"/></svg>
                        Доходы
                    </div>
                    <div class="kpi-value val-income skeleton" id="kpiIncome">000 000 ₸</div>
                </div>
                <div class="card kpi-card expense">
                    <div class="kpi-label">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><path d="M19.07 4.93a10 10 0 0 0-14.14 0M5.64 5.64a10 10 0 0 1 12.72 0"/><circle cx="12" cy="12" r="8"/></svg>
                        Расходы
                    </div>
                    <div class="kpi-value val-expense skeleton" id="kpiExpense">000 000 ₸</div>
                </div>
                <div class="card kpi-card balance">
                    <div class="kpi-label">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 3 20 7.5 20 16.5 12 21 4 16.5 4 7.5 12 3"/><polyline points="12 12 20 7.5"/><polyline points="12 12 12 21"/><polyline points="12 12 4 7.5"/></svg>
                        Остаток
                    </div>
                    <div class="kpi-value val-balance skeleton" id="kpiBalance">000 000 ₸</div>
                </div>
            </div>
            
            <div class="card top-expenses-card">
                <div class="section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Топ 5 расходов
                </div>
                <div class="expense-list" id="topExpensesList">
                    <div class="expense-item"><div class="skeleton skeleton-block"></div></div>
                    <div class="expense-item"><div class="skeleton skeleton-block"></div></div>
                    <div class="expense-item"><div class="skeleton skeleton-block"></div></div>
                </div>
            </div>
        </div>

        <div class="card table-card">
            <div class="table-header-wrapper">
                <div class="section-title" style="margin: 0;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                    Операции по дням
                </div>
            </div>
            <div class="table-wrapper" id="tableWrapper">
                <table id="transactionTable">
                    <thead>
                        <tr>
                            <th>Дата</th><th>Приход</th><th>Расход</th><th>Остаток</th>
                            <th>Материал</th><th>Заливка</th><th>Установка</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="7"><div class="skeleton skeleton-block"></div></td></tr>
                        <tr><td colspan="7"><div class="skeleton skeleton-block"></div></td></tr>
                        <tr><td colspan="7"><div class="skeleton skeleton-block"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeevuA1MTvQ09j-qcUWTPhArFe6k4Szilx6DB1kzEcnceA3ETJ1636AUpj8tRpldiZ8w/exec';
        const REFRESH_INTERVAL = 60000;

        const EXPENSE_CATEGORIES = [
            'Материал', 'Заливка', 'Установка', 'Доставка', 'Аренда', 'Зарплата', 
            'Ремонт', 'Кредит', 'Обед', 'Проезд', 'Личные расходы', 
            'Бензин Бакытжан', 'Коммунальные услуги', 'Расходники', 'Другие'
        ];

        let allTransactions = []; 
        let isFirstLoad = true;

        document.addEventListener('DOMContentLoaded', () => {
            const toast = document.getElementById('loadingToast');
            toast.classList.add('show');

            document.getElementById('startDate').addEventListener('change', applyFilter);
            document.getElementById('endDate').addEventListener('change', applyFilter);
            document.getElementById('clearDateBtn').addEventListener('click', () => {
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
                applyFilter();
            });

            const datePickerModal = document.getElementById('datePickerModal');
            const dateFilterBtn = document.getElementById('dateFilterBtnMobile');
            const datePickerCloseBtn = document.getElementById('datePickerCloseBtn');
            const datePickerApplyBtn = document.getElementById('datePickerApplyBtn');
            const datePickerCancelBtn = document.getElementById('datePickerCancelBtn');
            const startDateModal = document.getElementById('startDateModal');
            const endDateModal = document.getElementById('endDateModal');

            dateFilterBtn.addEventListener('click', () => {
                startDateModal.value = document.getElementById('startDate').value;
                endDateModal.value = document.getElementById('endDate').value;
                datePickerModal.classList.add('open');
            });

            datePickerCloseBtn.addEventListener('click', () => {
                datePickerModal.classList.remove('open');
            });

            datePickerModal.addEventListener('click', (e) => {
                if (e.target === datePickerModal) {
                    datePickerModal.classList.remove('open');
                }
            });

            datePickerApplyBtn.addEventListener('click', () => {
                document.getElementById('startDate').value = startDateModal.value;
                document.getElementById('endDate').value = endDateModal.value;
                datePickerModal.classList.remove('open');
                applyFilter();
            });

            datePickerCancelBtn.addEventListener('click', () => {
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
                startDateModal.value = '';
                endDateModal.value = '';
                datePickerModal.classList.remove('open');
                applyFilter();
            });

            fetchAndRender();
            setInterval(fetchAndRender, REFRESH_INTERVAL);
        });

        function formatCurrency(num) {
            return num.toLocaleString('ru-RU') + ' ₸';
        }

        function formatNumber(num) {
            if (num === 0) return '0';
            return num.toLocaleString('ru-RU');
        }

        function parseDate(dateStr) {
            if (!dateStr) return new Date();
            if (dateStr.includes('T')) return new Date(dateStr);
            const parts = dateStr.split(' ');
            const dateParts = parts[0].split('.');
            const timeParts = parts[1] ? parts[1].split(':') : [0,0,0];
            return new Date(
                parseInt(dateParts[2]),
                parseInt(dateParts[1]) - 1,
                parseInt(dateParts[0]),
                parseInt(timeParts[0]) || 0,
                parseInt(timeParts[1]) || 0,
                parseInt(timeParts[2]) || 0
            );
        }

        async function fetchAndRender() {
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error(`Ошибка HTTP`);
                const rawData = await response.json();
                
                if (Array.isArray(rawData) && rawData.length > 0) {
                    allTransactions = rawData.map(item => ({
                        date: item.date,
                        type: item.type,
                        category: item.category,
                        amount: Number(item.amount) || 0,
                        dateObj: parseDate(item.date)
                    })).sort((a, b) => a.dateObj - b.dateObj);
                    
                    applyFilter();
                }

                if (isFirstLoad) {
                    toast.classList.remove('show');
                    isFirstLoad = false;
                }
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                if (isFirstLoad) {
                    document.getElementById('loadingToast').querySelector('span').innerText = 'Ошибка соединения';
                    document.getElementById('loadingToast').querySelector('.spinner').style.display = 'none';
                }
            }
        }

        function applyFilter() {
            let filtered = allTransactions;
            const startDateVal = document.getElementById('startDate').value;
            const endDateVal = document.getElementById('endDate').value;

            if (startDateVal || endDateVal) {
                let start = startDateVal ? new Date(startDateVal) : new Date('2000-01-01');
                start.setHours(0, 0, 0, 0);
                
                let end = endDateVal ? new Date(endDateVal) : new Date('2100-01-01');
                end.setHours(23, 59, 59, 999);

                filtered = allTransactions.filter(t => t.dateObj >= start && t.dateObj <= end);
            }

            updateDashboard(filtered);
        }

        function updateDashboard(transactions) {
            const tableWrapper = document.getElementById('tableWrapper');
            const scrollTop = tableWrapper ? tableWrapper.scrollTop : 0;
            const scrollLeft = tableWrapper ? tableWrapper.scrollLeft : 0;

            let totalIncome = 0;
            let totalExpense = 0;
            const expenseByCategory = {};

            transactions.forEach(t => {
                if (t.type === 'Приход') totalIncome += t.amount;
                if (t.type === 'Расход') {
                    totalExpense += t.amount;
                    expenseByCategory[t.category] = (expenseByCategory[t.category] || 0) + t.amount;
                }
            });
            const balance = totalIncome - totalExpense;

            const kpiInc = document.getElementById('kpiIncome');
            const kpiExp = document.getElementById('kpiExpense');
            const kpiBal = document.getElementById('kpiBalance');
            
            kpiInc.classList.remove('skeleton');
            kpiExp.classList.remove('skeleton');
            kpiBal.classList.remove('skeleton');

            kpiInc.textContent = formatCurrency(totalIncome);
            kpiExp.textContent = formatCurrency(totalExpense);
            kpiBal.textContent = formatCurrency(balance);
            
            kpiBal.classList.add('val-balance');
            kpiBal.classList.remove('val-income', 'val-expense');

            const sortedExpenses = Object.entries(expenseByCategory)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);
                
            const topExpensesList = document.getElementById('topExpensesList');
            let topHtml = '';
            
            if (sortedExpenses.length === 0) {
                topHtml = '<div style="color: var(--text-tertiary); text-align: center; font-size: 14px; padding: 10px;">Нет данных</div>';
            } else {
                const maxExpense = sortedExpenses[0][1] || 1;
                sortedExpenses.forEach(e => {
                    const name = e[0];
                    const val = e[1];
                    const percent = ((val / maxExpense) * 100).toFixed(0);
                    topHtml += `
                        <div class="expense-item">
                            <div class="expense-meta">
                                <span class="expense-name">${name}</span>
                                <span class="expense-val">${formatCurrency(val)}</span>
                            </div>
                            <div class="expense-bar-bg">
                                <div class="expense-bar-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                });
            }
            topExpensesList.innerHTML = topHtml;

            const dailyMap = {};
            transactions.forEach(t => {
                const dateStr = t.dateObj.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
                
                if (!dailyMap[dateStr]) {
                    dailyMap[dateStr] = {
                        dateObj: new Date(t.dateObj.getFullYear(), t.dateObj.getMonth(), t.dateObj.getDate()),
                        dateStr: dateStr,
                        income: 0,
                        expense: 0,
                        cats: {}
                    };
                    EXPENSE_CATEGORIES.forEach(c => dailyMap[dateStr].cats[c] = 0);
                }

                if (t.type === 'Приход') {
                    dailyMap[dateStr].income += t.amount;
                } else if (t.type === 'Расход') {
                    dailyMap[dateStr].expense += t.amount;
                    if (EXPENSE_CATEGORIES.includes(t.category)) {
                        dailyMap[dateStr].cats[t.category] += t.amount;
                    } else {
                        dailyMap[dateStr].cats['Другие'] += t.amount;
                    }
                }
            });

            const dailyArray = Object.values(dailyMap).sort((a, b) => b.dateObj - a.dateObj);

            let sumIncome = 0;
            let sumExpense = 0;
            let sumCats = {};
            EXPENSE_CATEGORIES.forEach(c => sumCats[c] = 0);

            dailyArray.forEach(day => {
                sumIncome += day.income;
                sumExpense += day.expense;
                EXPENSE_CATEGORIES.forEach(c => sumCats[c] += day.cats[c]);
            });
            let sumBalance = sumIncome - sumExpense;

            let table = document.getElementById('transactionTable');
            
            let theadHTML = `
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Приход</th>
                        <th>Расход</th>
                        <th>Остаток</th>
                        ${EXPENSE_CATEGORIES.map(c => `<th>${c}</th>`).join('')}
                    </tr>
                    <tr class="total-row">
                        <th>Итого</th>
                        <th class="val-income">${formatNumber(sumIncome)}</th>
                        <th class="val-expense">${formatNumber(sumExpense)}</th>
                        <th class="val-balance">${formatNumber(sumBalance)}</th>
                        ${EXPENSE_CATEGORIES.map(c => `<th>${formatNumber(sumCats[c])}</th>`).join('')}
                    </tr>
                </thead>
                <tbody>
            `;

            let tbodyHTML = '';
            if (dailyArray.length === 0) {
                tbodyHTML = `<tr><td colspan="${4 + EXPENSE_CATEGORIES.length}" style="text-align:center; padding: 40px; color: var(--text-tertiary);">Нет операций за выбранный период</td></tr>`;
            } else {
                dailyArray.forEach(day => {
                    let dayBalance = day.income - day.expense;
                    tbodyHTML += `
                        <tr>
                            <td>${day.dateStr}</td>
                            <td class="val-income">${formatNumber(day.income)}</td>
                            <td class="val-expense">${formatNumber(day.expense)}</td>
                            <td class="val-balance" style="font-weight: 600;">${formatNumber(dayBalance)}</td>
                            ${EXPENSE_CATEGORIES.map(c => `<td>${formatNumber(day.cats[c])}</td>`).join('')}
                        </tr>
                    `;
                });
            }
            tbodyHTML += `</tbody>`;
            
            table.innerHTML = theadHTML + tbodyHTML;

            if (tableWrapper) {
                tableWrapper.scrollTop = scrollTop;
                tableWrapper.scrollLeft = scrollLeft;
            }
        }
    </script>
</body>
</html>
